<script>
    function toggleButton() {
        const idInput = document.getElementById('tvId').value;
        const waBtn = document.getElementById('waBtn');
        if(idInput.length >= 9) {
            waBtn.style.display = 'block';
        } else {
            waBtn.style.display = 'none';
        }
    }

    function sendWhatsApp() {
        // Your specific number: +232 77 244080
        const techNumber = "23277244080"; 
        const code = document.getElementById('tvId').value;
        
        const message = encodeURIComponent(
            `Support Request:\n` +
            `Android TeamViewer ID: ${code}\n` +
            `I have enabled permissions. Please connect.`
        );
        
        const url = `https://wa.me/${techNumber}?text=${message}`;
        window.open(url, '_blank');
    }
</script>
